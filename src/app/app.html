<div class="main">
  <h1>Marcelo Guedes Perdigão - 254476</h1>
  
  <input class="lg-text-input" #campoNovoItem />
  <button class="btn-primary" (click)="CREATE_tarefa(campoNovoItem.value)">
    Adicionar Tarefa
  </button>
  
  <ul>
    <li *ngFor="let t of arrayDeTarefas()">
      <app-item 
        [tarefa]="t" 
        (removeTarefa)="REMOVE_tarefa($event)"
        (modificaTarefa)="UPDATE_tarefa($event)">
      </app-item>
    </li>
  </ul>
</div>
